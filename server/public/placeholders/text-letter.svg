<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">信封化作乡野风景</title>
  <desc id="desc">一只白色信封立于柔和米色背景中，上半部溶解为乡村丘陵、农舍与蜿蜒小路的线稿，并带有绿色与棕色水彩晕染。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#efe4d3" />
      <stop offset="100%" stop-color="#e4d6c0" />
    </linearGradient>
    <linearGradient id="envelopeShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f2ede5" />
    </linearGradient>
    <linearGradient id="flapShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf6ef" />
      <stop offset="100%" stop-color="#ece3d7" />
    </linearGradient>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#8b7356" flood-opacity="0.16" />
    </filter>
    <filter id="softGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0" result="mono" />
      <feComponentTransfer in="mono">
        <feFuncA type="table" tableValues="0 0.045" />
      </feComponentTransfer>
    </filter>
    <filter id="waterBlur" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)" />
  <rect width="1200" height="675" fill="#fff" opacity="0.05" filter="url(#softGrain)" />

  <g opacity="0.4" filter="url(#waterBlur)">
    <path d="M288 374 C242 336 236 268 302 240 C354 216 416 234 444 288 C472 344 430 420 356 430 C330 434 308 420 288 374 Z" fill="#93ad7f" fill-opacity="0.4" />
    <path d="M728 206 C778 178 842 184 888 226 C930 264 944 326 902 356 C856 388 776 368 734 320 C704 286 692 228 728 206 Z" fill="#b79068" fill-opacity="0.28" />
    <path d="M646 458 C710 424 800 430 850 474 C886 508 878 558 822 574 C754 592 658 560 620 514 C596 484 604 458 646 458 Z" fill="#9caf8a" fill-opacity="0.26" />
  </g>

  <g transform="translate(300 88)">
    <ellipse cx="310" cy="490" rx="236" ry="38" fill="#b9a48a" opacity="0.18" filter="url(#waterBlur)" />

    <g transform="translate(0 2)" stroke="#73614c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.78">
      <path d="M154 196 C204 152 262 130 314 134 C376 138 424 174 470 212 C492 232 520 240 548 242" />
      <path d="M138 234 C194 202 250 196 300 208 C348 220 398 246 440 242 C474 238 506 224 536 212" />
      <path d="M178 260 C214 248 254 248 292 258 C330 268 366 286 412 284 C444 282 472 270 502 256" />
      <path d="M462 192 C488 208 504 228 512 252" />
      <path d="M476 186 C504 202 524 224 534 252" />
      <path d="M228 270 L228 230" />
      <path d="M220 236 C228 220 244 214 258 220 C270 224 278 238 274 252" />
      <path d="M260 270 L260 236" />
      <path d="M348 284 L348 242" />
      <path d="M338 250 C348 230 368 224 384 234 C396 242 400 258 396 272" />
      <path d="M382 284 L382 248" />
      <path d="M280 300 C322 312 360 334 390 366" />
      <path d="M390 366 C412 386 436 396 460 394" />
      <path d="M196 294 C214 304 230 320 244 342" />
    </g>

    <g opacity="0.58" filter="url(#waterBlur)">
      <path d="M140 222 C176 188 238 168 298 176 C356 184 408 208 456 246 L420 254 C372 226 320 206 270 204 C222 202 182 212 152 236 Z" fill="#89a06c" />
      <path d="M230 286 C274 264 328 266 372 282 C412 296 446 322 478 354 L436 356 C404 326 364 306 326 302 C286 300 254 306 222 324 Z" fill="#b2865e" fill-opacity="0.55" />
    </g>

    <g filter="url(#paperShadow)">
      <path d="M160 198 H460 C490 198 514 222 514 252 V430 H106 V252 C106 222 130 198 160 198 Z" fill="url(#envelopeShade)" />
      <path d="M106 252 L310 378 L514 252" fill="#f8f4ed" />
      <path d="M106 252 L310 378 L514 252" stroke="#d8cfc1" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M106 252 L232 344" stroke="#e0d6c9" stroke-width="3" />
      <path d="M514 252 L388 344" stroke="#e0d6c9" stroke-width="3" />
      <path d="M160 198 L310 322 L460 198" fill="url(#flapShade)" stroke="#ddd3c7" stroke-width="3" stroke-linejoin="round" />
      <path d="M106 252 H514" stroke="#e7ddd0" stroke-width="2" />
      <path d="M124 432 H496" stroke="#d9cdc0" stroke-width="2" opacity="0.7" />
    </g>

    <g opacity="0.16" filter="url(#softGrain)">
      <rect x="106" y="198" width="408" height="232" rx="10" fill="#8f7a5d" />
    </g>

    <g opacity="0.7">
      <path d="M118 214 C100 186 88 160 92 136 C98 104 124 88 156 92" stroke="#8ea57a" stroke-width="10" stroke-linecap="round" fill="none" filter="url(#waterBlur)" />
      <path d="M492 222 C532 188 560 166 584 170 C610 176 624 204 620 236" stroke="#a88460" stroke-width="11" stroke-linecap="round" fill="none" filter="url(#waterBlur)" />
      <path d="M220 442 C250 456 280 462 316 460" stroke="#98ad86" stroke-width="9" stroke-linecap="round" fill="none" filter="url(#waterBlur)" />
    </g>

    <g opacity="0.5" stroke="#8f7b61" stroke-width="2" stroke-linecap="round">
      <path d="M92 468 H198" />
      <path d="M428 468 H532" />
    </g>
  </g>
</svg>
