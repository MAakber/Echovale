<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">原始记录手写抄本</title>
  <desc id="desc">一张泛黄旧纸上的手写抄本，包含正文、边注与印章效果。</desc>
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b79f7b" />
      <stop offset="100%" stop-color="#8c7556" />
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f0dc" />
      <stop offset="50%" stop-color="#ecdcb8" />
      <stop offset="100%" stop-color="#dcc59b" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#5b4830" flood-opacity="0.25" />
    </filter>
    <filter id="paperGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0" result="monoNoise" />
      <feComponentTransfer in="monoNoise" result="softNoise">
        <feFuncA type="table" tableValues="0 0.04" />
      </feComponentTransfer>
    </filter>
    <filter id="inkBleed" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.45" />
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#desk)" />
  <g transform="translate(52 28) rotate(-2 540 300)">
    <rect x="10" y="42" width="1074" height="588" rx="8" fill="#cdb288" opacity="0.24" />
    <rect x="22" y="30" width="1062" height="588" rx="10" fill="url(#paper)" filter="url(#shadow)" />
    <rect x="22" y="30" width="1062" height="588" rx="10" fill="#fff" opacity="0.08" filter="url(#paperGrain)" />

    <g fill="none" stroke="#cfbf9e" stroke-width="1" opacity="0.6">
      <line x1="136" y1="162" x2="1016" y2="162" />
      <line x1="136" y1="232" x2="1016" y2="232" />
      <line x1="136" y1="302" x2="1016" y2="302" />
      <line x1="136" y1="372" x2="1016" y2="372" />
      <line x1="136" y1="442" x2="1016" y2="442" />
      <line x1="136" y1="512" x2="1016" y2="512" />
    </g>

    <text x="128" y="104" fill="#67503a" font-size="18" font-family="SimSun, serif" letter-spacing="4">乡村旧档抄录件</text>
    <text x="858" y="104" fill="#8d6f4c" font-size="16" font-family="FangSong, STFangsong, serif">抄录编号：乙巳春卷一</text>

    <g fill="#463222" font-family="STXingkai, Xingkai SC, KaiTi, STKaiti, serif" filter="url(#inkBleed)">
      <text x="138" y="150" font-size="34">谨录旧闻一则</text>
      <text x="146" y="222" font-size="36">村前石桥三孔，桥下春水缓行，鸡犬相闻，炊烟绕屋。</text>
      <text x="146" y="292" font-size="36">旧祠堂墙角尚存墨字，记某年修缮时众人捐工捐木之名。</text>
      <text x="146" y="362" font-size="36">祖母言，逢集日清晨，担盐挑米者满街，木屐声可达井边。</text>
      <text x="146" y="432" font-size="36">今人若问旧村如何，惟将桥井古树晒场，一一书之。</text>
      <text x="146" y="502" font-size="36">故录此页，留作凭照，亦备来日修志时有所依据。</text>
    </g>

    <g fill="#74553c" font-family="STXingkai, Xingkai SC, KaiTi, STKaiti, serif" opacity="0.92">
      <text x="144" y="564" font-size="26">抄录人：乡校旧藏整理</text>
      <text x="804" y="564" font-size="24">录于旧历三月廿一</text>
    </g>

    <g transform="translate(918 432) rotate(-6)">
      <circle cx="58" cy="58" r="50" fill="#9e2d1f" opacity="0.12" />
      <circle cx="58" cy="58" r="41" fill="none" stroke="#8e271b" stroke-width="4" opacity="0.52" />
      <text x="58" y="52" text-anchor="middle" fill="#8e271b" font-size="17" font-family="SimSun, serif">乡土档案</text>
      <text x="58" y="74" text-anchor="middle" fill="#8e271b" font-size="15" font-family="SimSun, serif">抄存</text>
    </g>
  </g>
</svg>
